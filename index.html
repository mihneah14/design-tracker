<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Tracker — Universum Events</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #181818; --surface2: #222222; --border: #2e2e2e;
    --accent: #e8c547; --accent2: #4ecdc4; --danger: #ff6b6b; --pitch: #a78bfa; --impl: #4ecdc4;
    --text: #e8e8e8; --text2: #888; --text3: #555;
    --teo: #e8c547; --mircea: #4ecdc4; --cristi: #ff9f43;
    --font-mono: 'IBM Plex Mono', monospace; --font-sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; font-size: 14px; }

  /* LOADING */
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 16px; backdrop-filter: blur(3px); }
  .loading-overlay.show { display: flex; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: var(--font-mono); font-size: 12px; color: var(--text2); letter-spacing: 0.1em; }

  /* HEADER */
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--font-mono); font-size: 13px; font-weight: 600; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
  .logo span { color: var(--text2); font-weight: 400; }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .view-switcher { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .view-btn { padding: 6px 14px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; background: none; border: none; color: var(--text2); cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .view-btn.active { background: var(--accent); color: #0f0f0f; font-weight: 600; }
  .btn-primary { background: var(--accent); color: #0f0f0f; border: none; padding: 8px 18px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; font-family: var(--font-mono); font-size: 10px; cursor: pointer; border-radius: 3px; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.08em; }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

  /* LAYOUT — main + side panel */
  .app-body { display: flex; min-height: calc(100vh - 57px); transition: all 0.3s ease; }
  .main-content { flex: 1; min-width: 0; transition: all 0.3s ease; }
  .container { padding: 24px 28px; max-width: 1500px; margin: 0 auto; }
  .section-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
  .info-banner { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 16px; font-family: var(--font-mono); font-size: 11px; color: var(--text2); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .dot-green { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; flex-shrink: 0; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* DESIGNER CARDS */
  .designer-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
  .designer-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px; position: relative; overflow: hidden; }
  .designer-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .designer-card.teo::before { background: var(--teo); }
  .designer-card.mircea::before { background: var(--mircea); }
  .designer-card.cristi::before { background: var(--cristi); }
  .designer-name { font-family: var(--font-mono); font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .designer-name.teo { color: var(--teo); } .designer-name.mircea { color: var(--mircea); } .designer-name.cristi { color: var(--cristi); }
  .stats-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .stat { flex: 1; }
  .stat-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3px; font-family: var(--font-mono); }
  .stat-value { font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: var(--text); }
  .stat-value span { font-size: 11px; color: var(--text2); font-weight: 400; }
  .workload-bar-bg { background: var(--bg); border-radius: 2px; height: 5px; overflow: hidden; margin-bottom: 5px; }
  .workload-bar { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .workload-label { font-family: var(--font-mono); font-size: 10px; color: var(--text2); display: flex; justify-content: space-between; }
  .status-badge { display: inline-block; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; font-weight: 600; }
  .status-badge.available { background: #1a3a1a; color: #4ade80; }
  .status-badge.busy { background: #3a2a0a; color: var(--accent); }
  .status-badge.overloaded { background: #3a1a1a; color: var(--danger); }

  /* TABLE */
  .projects-section { margin-bottom: 28px; }
  .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-btn { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; background: none; border: 1px solid var(--border); color: var(--text2); cursor: pointer; border-radius: 3px; transition: all 0.15s; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }
  .filter-btn.pitch-active { border-color: var(--pitch); color: var(--pitch); }
  .filter-btn.impl-active { border-color: var(--impl); color: var(--impl); }
  select.filter-select { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; padding: 5px 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text2); cursor: pointer; border-radius: 3px; outline: none; }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  thead th { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); background: var(--bg); white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.15s; }
  thead th:hover { color: var(--text2); }
  thead th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }
  thead th.pitch-col { color: var(--pitch); } thead th.impl-col { color: var(--impl); }
  thead th.no-sort { cursor: default; }
  thead th.no-sort:hover { color: var(--text3); }

  /* PROJECT rows */
  tbody tr.proj-row { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr.proj-row:hover { background: var(--surface2); }
  tbody tr.proj-row.active-panel { background: #1e1e1e; border-left: 2px solid var(--accent); }
  tbody tr.designer-subrow { border-bottom: 1px solid rgba(46,46,46,0.5); background: rgba(0,0,0,0.15); }
  tbody tr.designer-subrow td { padding: 6px 14px 6px 28px; }
  tbody tr.designer-subrow:last-of-type { border-bottom: 1px solid var(--border); }
  tbody tr.total-row td { border-top: 2px solid var(--border); color: var(--text2); font-family: var(--font-mono); font-size: 11px; padding-top: 14px; }
  tbody td { padding: 10px 14px; font-size: 13px; vertical-align: middle; }

  .project-name { font-weight: 500; color: var(--text); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .project-client { font-size: 11px; color: var(--text2); font-family: var(--font-mono); margin-top: 2px; }
  .deadline-display { font-family: var(--font-mono); font-size: 10px; margin-top: 3px; }
  .deadline-ok { color: var(--text3); }
  .deadline-soon { color: var(--accent); }
  .deadline-over { color: var(--danger); }

  .hours-block { font-family: var(--font-mono); font-size: 11px; white-space: nowrap; }
  .hours-real { color: var(--text); font-weight: 600; }
  .hours-est { color: var(--text2); }
  .hours-sep { color: var(--text3); margin: 0 2px; }
  .progress-mini { width: 50px; height: 3px; background: var(--bg); border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 5px; }
  .progress-mini-fill { height: 100%; border-radius: 2px; }
  .fill-pitch { background: var(--pitch); } .fill-impl { background: var(--impl); }
  .fill-warn { background: var(--accent); } .fill-over { background: var(--danger); }
  .cost-cell { font-family: var(--font-mono); font-size: 11px; color: var(--accent2); }

  .action-btn { background: none; border: 1px solid var(--border); color: var(--text2); padding: 4px 8px; font-family: var(--font-mono); font-size: 10px; cursor: pointer; border-radius: 3px; transition: all 0.15s; margin-right: 3px; white-space: nowrap; }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .proj-status { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; font-weight: 600; }
  .proj-status.active { background: #1a2a3a; color: var(--accent2); }
  .proj-status.completed { background: #1a3a1a; color: #4ade80; }
  .proj-status.paused { background: #2a2a1a; color: var(--accent); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-family: var(--font-mono); font-size: 13px; }
  .empty-state div:first-child { font-size: 32px; margin-bottom: 12px; }

  /* Designer sub-row elements */
  .sub-designer-name { font-family: var(--font-mono); font-size: 10px; display: flex; align-items: center; gap: 5px; color: var(--text2); }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot.teo { background: var(--teo); } .dot.mircea { background: var(--mircea); } .dot.cristi { background: var(--cristi); }

  /* SIDE PANEL */
  .side-panel { width: 0; overflow: hidden; border-left: 0px solid var(--border); background: var(--surface); transition: width 0.3s ease, border 0.3s ease; flex-shrink: 0; position: sticky; top: 57px; height: calc(100vh - 57px); overflow-y: auto; }
  .side-panel.open { width: 380px; border-left: 1px solid var(--border); }
  .panel-inner { width: 380px; padding: 0; }
  .panel-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 10; }
  .panel-title { font-family: var(--font-mono); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }
  .panel-subtitle { font-size: 11px; color: var(--text2); margin-top: 3px; font-family: var(--font-mono); }
  .panel-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 18px; padding: 0; line-height: 1; transition: color 0.15s; }
  .panel-close:hover { color: var(--text); }
  .panel-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .panel-section-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .panel-field { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .panel-field-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); white-space: nowrap; }
  .panel-field-value { font-family: var(--font-mono); font-size: 11px; color: var(--text); text-align: right; }

  /* Panel designer breakdown */
  .panel-designer-block { background: var(--bg); border-radius: 4px; padding: 10px 12px; margin-bottom: 8px; }
  .panel-designer-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
  .panel-designer-header.teo { color: var(--teo); } .panel-designer-header.mircea { color: var(--mircea); } .panel-designer-header.cristi { color: var(--cristi); }
  .panel-phase-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .panel-phase-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
  .panel-phase-label.pitch { color: var(--pitch); } .panel-phase-label.impl { color: var(--impl); }
  .panel-phase-nums { font-family: var(--font-mono); font-size: 11px; }
  .panel-phase-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 3px; }
  .panel-phase-bar-fill { height: 100%; border-radius: 2px; }

  /* LOG */
  .log-list { display: flex; flex-direction: column; gap: 0; }
  .log-entry { padding: 10px 0; border-bottom: 1px solid rgba(46,46,46,0.5); }
  .log-entry:last-child { border-bottom: none; }
  .log-time { font-family: var(--font-mono); font-size: 9px; color: var(--text3); margin-bottom: 4px; }
  .log-changes { display: flex; flex-direction: column; gap: 3px; }
  .log-change { font-family: var(--font-mono); font-size: 10px; color: var(--text2); }
  .log-change .old { color: var(--danger); text-decoration: line-through; }
  .log-change .new { color: #4ade80; }
  .log-change .arrow { color: var(--text3); margin: 0 4px; }
  .log-empty { font-family: var(--font-mono); font-size: 11px; color: var(--text3); text-align: center; padding: 20px 0; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; width: 620px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .modal-title { font-family: var(--font-mono); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }
  .modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1; padding: 0; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text2); margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; font-family: var(--font-sans); font-size: 13px; border-radius: 4px; outline: none; transition: border-color 0.15s; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-footer { display: flex; gap: 10px; justify-content: flex-end; padding: 16px 24px; border-top: 1px solid var(--border); }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text2); padding: 8px 18px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; border-radius: 3px; transition: all 0.15s; text-transform: uppercase; }
  .btn-cancel:hover { border-color: var(--text2); color: var(--text); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .section-title { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

  /* DESIGNER ROWS IN MODAL */
  .designer-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .designer-row { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 14px; }
  .designer-row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .designer-row-name { font-family: var(--font-mono); font-size: 13px; font-weight: 600; }
  .designer-row-name.teo { color: var(--teo); } .designer-row-name.mircea { color: var(--mircea); } .designer-row-name.cristi { color: var(--cristi); }
  .btn-remove { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; transition: color 0.15s; padding: 0; line-height: 1; }
  .btn-remove:hover { color: var(--danger); }
  .phase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .phase-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .phase-label.pitch { color: var(--pitch); } .phase-label.impl { color: var(--impl); }
  .phase-inputs-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .mini-label { font-family: var(--font-mono); font-size: 9px; color: var(--text3); margin-bottom: 3px; }
  .add-designer-bar { display: flex; gap: 8px; align-items: center; }
  .add-designer-bar select { flex: 1; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--accent); color: var(--accent); padding: 10px 18px; font-family: var(--font-mono); font-size: 12px; border-radius: 4px; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">Universum <span>/ Design Tracker</span></div>
  <div class="header-right">
    <div class="view-switcher">
      <button class="view-btn active" onclick="switchView('manager', this)">Manager</button>
      <button class="view-btn" onclick="switchView('designer', this)">Designer</button>
    </div>
    <select id="designerSelector" class="form-select" style="width:auto;padding:6px 10px;font-size:11px;display:none;" onchange="setActiveDesigner(this.value)">
      <option value="Teo">Teo</option><option value="Mircea">Mircea</option><option value="Cristi">Cristi</option>
    </select>
    <button class="btn-secondary" onclick="loadAllData()">↻ Refresh</button>
    <button class="btn-primary" onclick="openAddProject()">+ Proiect nou</button>
  </div>
</header>

<div class="app-body">
  <div class="main-content">
    <div class="container">
      <div class="info-banner"><span class="dot-green"></span><span>Date sincronizate cu Google Sheets</span></div>
      <div class="section-label">Workload curent</div>
      <div class="designer-cards" id="designerCards"></div>
      <div class="projects-section">
        <div class="table-header">
          <div class="section-label" style="margin-bottom:0">Proiecte</div>
          <div class="filters">
            <button class="filter-btn active" onclick="setStatusFilter('all',this)">Toate</button>
            <button class="filter-btn" onclick="setStatusFilter('active',this)">Active</button>
            <button class="filter-btn" onclick="setStatusFilter('completed',this)">Finalizate</button>
            <button class="filter-btn active" id="phaseFilterBtn" onclick="cyclePhase(this)">Faza: Toate</button>
            <select class="filter-select" id="designerFilter" onchange="renderTable()">
              <option value="all">Toți designerii</option>
              <option value="Teo">Teo</option><option value="Mircea">Mircea</option><option value="Cristi">Cristi</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th onclick="setSort('name')">Proiect / Client</th>
                <th class="no-sort">Status</th>
                <th onclick="setSort('deadline')">Deadline</th>
                <th class="pitch-col no-sort">Pitch real / est.</th>
                <th class="impl-col no-sort">Impl. real / est.</th>
                <th onclick="setSort('total')">Total ore</th>
                <th onclick="setSort('cost')">Cost (25€/h)</th>
                <th class="no-sort">Acțiuni</th>
              </tr>
            </thead>
            <tbody id="projectsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel" id="sidePanel">
    <div class="panel-inner" id="panelInner"></div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="projModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="projModalTitle">Proiect nou</div>
      <button class="modal-close" onclick="closeModal('projModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Nume proiect</label><input class="form-input" id="f_name" placeholder="ex. Gala Anuală BCR"></div>
        <div class="form-group"><label class="form-label">Client</label><input class="form-input" id="f_client" placeholder="ex. BCR"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-select" id="f_status">
            <option value="active">Activ</option><option value="completed">Finalizat</option><option value="paused">Pauzat</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Deadline</label><input class="form-input" id="f_deadline" type="date"></div>
      </div>
      <hr class="divider">
      <div class="section-title">Designeri — ore estimate & realizate</div>
      <div class="designer-rows" id="designerRows"></div>
      <div class="add-designer-bar">
        <select class="form-select" id="addDesignerSel">
          <option value="Teo">Teo</option><option value="Mircea">Mircea</option><option value="Cristi">Cristi</option>
        </select>
        <button class="btn-secondary" onclick="addDesignerRow()">+ Adaugă designer</button>
      </div>
      <hr class="divider">
      <div class="form-group"><label class="form-label">Notă</label><textarea class="form-textarea" id="f_note" rows="2" placeholder="Detalii suplimentare..."></textarea></div>
    </div>
    <div class="form-footer">
      <button class="btn-cancel" onclick="closeModal('projModal')">Anulează</button>
      <button class="btn-primary" onclick="saveProject()">Salvează</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div class="loading-text" id="loadingText">Se încarcă...</div></div>
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXP-JwYg2TXwR-IezLMKUk6_z4DdTkJBE8LlABYgQ5M745NGxjeukWg2dAhQNY6zcG/exec';
const RATE = 25;
const DESIGNERS = ['Teo','Mircea','Cristi'];
const DC = { Teo:'#e8c547', Mircea:'#4ecdc4', Cristi:'#ff9f43' };

// ─── API ──────────────────────────────────
async function apiFetch(payload) {
  const url = `${SCRIPT_URL}?payload=${encodeURIComponent(JSON.stringify(payload))}`;
  const r = await fetch(url);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}
async function apiRead(sheet) {
  const r = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}`);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d.rows || [];
}
async function apiAppend(sheet, row) { return apiFetch({action:'append',sheet,row}); }
async function apiUpdate(sheet, id, row) { return apiFetch({action:'update',sheet,id,row}); }
async function apiClear(sheet, id) { return apiFetch({action:'clear',sheet,id}); }
async function apiInitHeaders(sheet, headers) { return apiFetch({action:'initHeaders',sheet,headers}); }

// ─── STATE ────────────────────────────────
let db = { projects:[], allocations:[], logs:[] };
let editingId = null;
let currentStatusFilter = 'all', currentPhaseFilter = 'all';
let currentView = 'manager', activeDesigner = 'Teo';
let formDesigners = [];
let activePanelId = null;
let sortCol = 'deadline', sortDir = 'asc';

// ─── DATE HELPERS ─────────────────────────
function formatDate(str) {
  if (!str) return '—';
  // Handle both YYYY-MM-DD and full timestamp strings
  const match = String(str).match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!match) return str;
  return `${match[1]}-${match[2]}-${match[3]}`;
}

function deadlineDaysLeft(str) {
  if (!str) return null;
  const match = String(str).match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!match) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const dl = new Date(Number(match[1]), Number(match[2])-1, Number(match[3]));
  return Math.round((dl - today) / 86400000);
}

function deadlineClass(str) {
  const d = deadlineDaysLeft(str);
  if (d === null) return '';
  if (d < 0) return 'deadline-over';
  if (d <= 5) return 'deadline-soon';
  return 'deadline-ok';
}

function deadlineLabel(str) {
  const d = deadlineDaysLeft(str);
  if (d === null) return '';
  if (d < 0) return ` (${Math.abs(d)}z depășit)`;
  if (d === 0) return ' (azi!)';
  if (d <= 5) return ` (${d}z)`;
  return '';
}

// ─── SORTING ──────────────────────────────
function setSort(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
  });
  event.currentTarget.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
  renderTable();
}

function sortedProjects(projs) {
  return [...projs].sort((a,b) => {
    let va, vb;
    if (sortCol === 'name') { va = a.name||''; vb = b.name||''; return sortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va); }
    if (sortCol === 'deadline') {
      va = a.deadline ? String(a.deadline).slice(0,10) : '9999';
      vb = b.deadline ? String(b.deadline).slice(0,10) : '9999';
      return sortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    if (sortCol === 'total' || sortCol === 'cost') {
      const sumReal = p => getAllocs(p.id).reduce((s,a)=>s+n(a.pitchReal)+n(a.implReal),0);
      va = sumReal(a); vb = sumReal(b);
      return sortDir==='asc' ? va-vb : vb-va;
    }
    return 0;
  });
}

// ─── HELPERS ──────────────────────────────
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function getAllocs(pid) { return db.allocations.filter(a=>a.projectId===pid); }
function n(v) { return Number(v)||0; }

function getDesignerTotals(d) {
  const activeIds = new Set(db.projects.filter(p=>p.status==='active').map(p=>p.id));
  const allocs = db.allocations.filter(a=>a.designer===d && activeIds.has(a.projectId));
  return {
    real: allocs.reduce((s,a)=>s+n(a.pitchReal)+n(a.implReal),0),
    est:  allocs.reduce((s,a)=>s+n(a.pitchEst)+n(a.implEst),0)
  };
}

function toast(msg, isErr=false) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.borderColor=isErr?'var(--danger)':'var(--accent)'; el.style.color=isErr?'var(--danger)':'var(--accent)';
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3500);
}
function showLoading(msg) { document.getElementById('loadingText').textContent=msg; document.getElementById('loadingOverlay').classList.add('show'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); editingId=null; }

async function loadAllData() {
  showLoading('Se încarcă datele...');
  try {
    const [p,a,l] = await Promise.all([apiRead('Projects'), apiRead('Allocations'), apiRead('Logs')]);
    db.projects = p; db.allocations = a; db.logs = l;
    render();
    if (activePanelId) openPanel(activePanelId);
    toast('Date actualizate ✓');
  } catch(e) { toast('Eroare: '+e.message, true); console.error(e); }
  hideLoading();
}

// ─── LOG HELPERS ──────────────────────────
async function appendLog(projectId, changes) {
  const logEntry = {
    id: uid(),
    projectId,
    timestamp: new Date().toISOString(),
    changes: JSON.stringify(changes)
  };
  try {
    await apiAppend('Logs', logEntry);
    db.logs.push(logEntry);
  } catch(e) { console.warn('Log append failed:', e); }
}

function buildDiff(oldProj, newProj, oldAllocs, newAllocs) {
  const changes = [];
  // Project field changes
  const fields = [{k:'name',l:'Nume'},{k:'client',l:'Client'},{k:'status',l:'Status'},{k:'deadline',l:'Deadline'},{k:'note',l:'Notă'}];
  for (const {k,l} of fields) {
    const ov = oldProj[k]||'', nv = newProj[k]||'';
    if (String(ov).trim() !== String(nv).trim()) {
      const oval = k==='deadline' ? formatDate(ov)||'—' : ov||'—';
      const nval = k==='deadline' ? formatDate(nv)||'—' : nv||'—';
      changes.push({field: l, old: oval, new: nval});
    }
  }
  // Allocation changes
  for (const nd of newAllocs) {
    const od = oldAllocs.find(x=>x.designer===nd.designer);
    if (!od) {
      changes.push({field:`${nd.designer} adăugat`, old:'—', new:`Pitch ${nd.pitchEst||0}h est / ${nd.pitchReal||0}h real · Impl ${nd.implEst||0}h est / ${nd.implReal||0}h real`});
    } else {
      const hFields = [{k:'pitchEst',l:`${nd.designer} Pitch est`},{k:'pitchReal',l:`${nd.designer} Pitch real`},{k:'implEst',l:`${nd.designer} Impl est`},{k:'implReal',l:`${nd.designer} Impl real`}];
      for (const {k,l} of hFields) {
        if (n(od[k]) !== n(nd[k])) changes.push({field:l, old:`${n(od[k])}h`, new:`${n(nd[k])}h`});
      }
    }
  }
  for (const od of oldAllocs) {
    if (!newAllocs.find(x=>x.designer===od.designer)) {
      changes.push({field:`${od.designer} eliminat`, old:'—', new:'—'});
    }
  }
  return changes;
}

// ─── RENDER ───────────────────────────────
function switchView(v,btn) {
  currentView=v; document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  document.getElementById('designerSelector').style.display=v==='designer'?'block':'none'; render();
}
function setActiveDesigner(d) { activeDesigner=d; render(); }
function render() { renderCards(); renderTable(); }

function workingDaysUntil(deadlineStr) {
  if (!deadlineStr) return null;
  const match = String(deadlineStr).match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!match) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const end = new Date(Number(match[1]), Number(match[2])-1, Number(match[3]));
  if (end <= today) return 0;
  let days = 0, cur = new Date(today);
  while (cur < end) {
    cur.setDate(cur.getDate()+1);
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) days++;
  }
  return days;
}

function getDesignerHPerDay(designer) {
  const activeAllocs = db.allocations.filter(a => {
    const p = db.projects.find(pr=>pr.id===a.projectId);
    return a.designer===designer && p && p.status==='active';
  });
  let totalHPerDay = 0;
  const details = [];
  for (const a of activeAllocs) {
    const p = db.projects.find(pr=>pr.id===a.projectId);
    const oreRamase = Math.max(0, (n(a.pitchEst)+n(a.implEst)) - (n(a.pitchReal)+n(a.implReal)));
    if (oreRamase <= 0) continue;
    const zile = workingDaysUntil(p.deadline);
    if (zile === null) { details.push({name:p.name, hpd:null, oreRamase}); continue; }
    if (zile === 0) { totalHPerDay += oreRamase; details.push({name:p.name, hpd:'⚠', oreRamase}); continue; }
    const hpd = oreRamase / zile;
    totalHPerDay += hpd;
    details.push({name:p.name, hpd, oreRamase, zile});
  }
  return { totalHPerDay, details, count: activeAllocs.length };
}

function renderCards() {
  const designers = currentView==='designer' ? [activeDesigner] : DESIGNERS;
  document.getElementById('designerCards').innerHTML = designers.map(d => {
    const tot = getDesignerTotals(d);
    const { totalHPerDay, details, count } = getDesignerHPerDay(d);
    const hpd = totalHPerDay;
    const st = hpd > 6 ? 'overloaded' : hpd > 4 ? 'busy' : 'available';
    const stL = {available:'Disponibil', busy:'Ocupat', overloaded:'Suprasolicitat'}[st];
    const bc = st==='overloaded'?'var(--danger)':st==='busy'?'var(--accent)':DC[d];
    const barPct = Math.min((hpd/8)*100, 100);
    const detailRows = details.length ? details.map(d2 => {
      const hpdStr = d2.hpd===null ? '(fără deadline)' : d2.hpd==='⚠' ? '⚠ deadline depășit' : `${d2.hpd.toFixed(1)}h/zi`;
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;" title="${d2.name}">${d2.name}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:${d2.hpd===null?'var(--text3)':d2.hpd==='⚠'?'var(--danger)':'var(--text)'};">${hpdStr}</span>
      </div>`;
    }).join('') : `<div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);padding:6px 0;">Niciun proiect activ</div>`;
    return `<div class="designer-card ${d.toLowerCase()}">
      <div class="designer-name ${d.toLowerCase()}">${d}</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-label">Proiecte active</div><div class="stat-value">${count}</div></div>
        <div class="stat"><div class="stat-label">Ore rămase</div><div class="stat-value">${Math.max(0,tot.est-tot.real).toFixed(1)}<span>h</span></div></div>
        <div class="stat"><div class="stat-label">Ritm necesar</div><div class="stat-value" style="color:${bc}">${hpd.toFixed(1)}<span>h/zi</span></div></div>
      </div>
      <div class="workload-bar-bg"><div class="workload-bar" style="width:${barPct}%;background:${bc}"></div></div>
      <div class="workload-label" style="margin-bottom:10px;"><span>${hpd.toFixed(1)}h/zi din 8h disponibile</span><span class="status-badge ${st}">${stL}</span></div>
      <div style="border-top:1px solid var(--border);padding-top:8px;">${detailRows}</div>
    </div>`;
  }).join('');
}

function renderTable() {
  const df = document.getElementById('designerFilter').value;
  let projs = db.projects.filter(p => {
    if (currentStatusFilter!=='all' && p.status!==currentStatusFilter) return false;
    if (df!=='all' && !db.allocations.find(a=>a.projectId===p.id&&a.designer===df)) return false;
    if (currentView==='designer' && !db.allocations.find(a=>a.projectId===p.id&&a.designer===activeDesigner)) return false;
    return true;
  });
  projs = sortedProjects(projs);

  const tbody = document.getElementById('projectsBody');
  if (!projs.length) {
    tbody.innerHTML=`<tr><td colspan="8"><div class="empty-state"><div>📋</div>Niciun proiect găsit</div></td></tr>`;
    return;
  }

  let tPR=0,tPE=0,tIR=0,tIE=0;
  let html = '';

  for (const p of projs) {
    const allocs = getAllocs(p.id);
    const pR = allocs.reduce((s,a)=>s+n(a.pitchReal),0);
    const pE = allocs.reduce((s,a)=>s+n(a.pitchEst),0);
    const iR = allocs.reduce((s,a)=>s+n(a.implReal),0);
    const iE = allocs.reduce((s,a)=>s+n(a.implEst),0);
    const tR = pR+iR, tE = pE+iE;
    tPR+=pR; tPE+=pE; tIR+=iR; tIE+=iE;

    const stL = {active:'Activ',completed:'Finalizat',paused:'Pauzat'}[p.status]||p.status;
    const dlFmt = formatDate(p.deadline);
    const dlClass = deadlineClass(p.deadline);
    const dlLabel = deadlineLabel(p.deadline);
    const pPct = pE>0?Math.min(Math.round((pR/pE)*100),200):0;
    const iPct = iE>0?Math.min(Math.round((iR/iE)*100),200):0;
    const pF = pPct>100?'fill-over':pPct>75?'fill-warn':'fill-pitch';
    const iF = iPct>100?'fill-over':iPct>75?'fill-warn':'fill-impl';
    const sp = currentPhaseFilter==='all'||currentPhaseFilter==='pitch';
    const si = currentPhaseFilter==='all'||currentPhaseFilter==='implementare';
    const isActive = activePanelId === p.id;

    html += `<tr class="proj-row${isActive?' active-panel':''}" onclick="togglePanel('${p.id}')">
      <td>
        <div class="project-name" title="${p.name}">${p.name}</div>
        <div class="project-client">${p.client||'—'}</div>
      </td>
      <td><span class="proj-status ${p.status}">${stL}</span></td>
      <td>
        ${dlFmt !== '—' ? `<span class="deadline-display ${dlClass}" style="font-family:var(--font-mono);font-size:11px;">${dlFmt}<span style="font-size:9px;">${dlLabel}</span></span>` : '<span style="color:var(--text3);font-family:var(--font-mono);font-size:11px;">—</span>'}
      </td>
      <td class="hours-block" style="opacity:${sp?1:0.2}">
        <span class="hours-real">${pR.toFixed(1)}</span><span class="hours-sep">/</span><span class="hours-est">${pE>0?pE+'h':'—'}</span>
        ${pE>0?`<div class="progress-mini"><div class="progress-mini-fill ${pF}" style="width:${Math.min(pPct,100)}%"></div></div>`:''}
      </td>
      <td class="hours-block" style="opacity:${si?1:0.2}">
        <span class="hours-real">${iR.toFixed(1)}</span><span class="hours-sep">/</span><span class="hours-est">${iE>0?iE+'h':'—'}</span>
        ${iE>0?`<div class="progress-mini"><div class="progress-mini-fill ${iF}" style="width:${Math.min(iPct,100)}%"></div></div>`:''}
      </td>
      <td class="hours-block"><span class="hours-real">${tR.toFixed(1)}</span><span class="hours-sep">/</span><span class="hours-est">${tE>0?tE+'h':'—'}</span></td>
      <td class="cost-cell">${tR>0?(tR*RATE).toFixed(0)+' €':'—'}</td>
      <td onclick="event.stopPropagation()">
        <button class="action-btn" onclick="editProject('${p.id}')">Edit</button>
        <button class="action-btn danger" onclick="deleteProject('${p.id}')">✕</button>
      </td>
    </tr>`;

    // Designer sub-rows
    if (allocs.length > 1) {
      for (const a of allocs) {
        const apR = n(a.pitchReal), apE = n(a.pitchEst);
        const aiR = n(a.implReal), aiE = n(a.implEst);
        const atR = apR+aiR, atE = apE+aiE;
        const apPct = apE>0?Math.min(Math.round((apR/apE)*100),200):0;
        const aiPct = aiE>0?Math.min(Math.round((aiR/aiE)*100),200):0;
        const apF = apPct>100?'fill-over':apPct>75?'fill-warn':'fill-pitch';
        const aiF = aiPct>100?'fill-over':aiPct>75?'fill-warn':'fill-impl';
        html += `<tr class="designer-subrow" onclick="togglePanel('${p.id}')">
          <td colspan="2">
            <div class="sub-designer-name"><span class="dot ${a.designer.toLowerCase()}"></span>${a.designer}</div>
          </td>
          <td></td>
          <td class="hours-block" style="opacity:${sp?1:0.2}">
            <span class="hours-real">${apR.toFixed(1)}</span><span class="hours-sep">/</span><span class="hours-est">${apE>0?apE+'h':'—'}</span>
            ${apE>0?`<div class="progress-mini"><div class="progress-mini-fill ${apF}" style="width:${Math.min(apPct,100)}%"></div></div>`:''}
          </td>
          <td class="hours-block" style="opacity:${si?1:0.2}">
            <span class="hours-real">${aiR.toFixed(1)}</span><span class="hours-sep">/</span><span class="hours-est">${aiE>0?aiE+'h':'—'}</span>
            ${aiE>0?`<div class="progress-mini"><div class="progress-mini-fill ${aiF}" style="width:${Math.min(aiPct,100)}%"></div></div>`:''}
          </td>
          <td class="hours-block"><span class="hours-real">${atR.toFixed(1)}</span><span class="hours-sep">/</span><span class="hours-est">${atE>0?atE+'h':'—'}</span></td>
          <td class="cost-cell">${atR>0?(atR*RATE).toFixed(0)+' €':'—'}</td>
          <td></td>
        </tr>`;
      }
    }
  }

  const tR=tPR+tIR, tE=tPE+tIE;
  html += `<tr class="total-row">
    <td colspan="2" style="color:var(--text3);font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em">Total</td>
    <td></td>
    <td class="hours-block"><span class="hours-real">${tPR.toFixed(1)}</span><span class="hours-sep">/</span><span class="hours-est">${tPE>0?tPE+'h':'—'}</span></td>
    <td class="hours-block"><span class="hours-real">${tIR.toFixed(1)}</span><span class="hours-sep">/</span><span class="hours-est">${tIE>0?tIE+'h':'—'}</span></td>
    <td class="hours-block"><span class="hours-real">${tR.toFixed(1)}</span><span class="hours-sep">/</span><span class="hours-est">${tE>0?tE+'h':'—'}</span></td>
    <td class="cost-cell">${tR>0?(tR*RATE).toFixed(0)+' €':'—'}</td>
    <td></td>
  </tr>`;

  tbody.innerHTML = html;
}

function setStatusFilter(f,btn) {
  currentStatusFilter=f;
  document.querySelectorAll('.filter-btn:not(#phaseFilterBtn)').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderTable();
}
function cyclePhase(btn) {
  const states=['all','pitch','implementare'],labels=['Faza: Toate','Faza: Pitch','Faza: Implementare'],classes=['active','pitch-active','impl-active'];
  const next=(states.indexOf(currentPhaseFilter)+1)%3;
  currentPhaseFilter=states[next]; btn.textContent=labels[next]; btn.className='filter-btn '+classes[next]; renderTable();
}

// ─── SIDE PANEL ───────────────────────────
function togglePanel(pid) {
  if (activePanelId === pid) { closePanel(); return; }
  openPanel(pid);
}

function closePanel() {
  activePanelId = null;
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('panelInner').innerHTML = '';
  renderTable();
}

function openPanel(pid) {
  const p = db.projects.find(x=>x.id===pid);
  if (!p) return;
  activePanelId = pid;
  document.getElementById('sidePanel').classList.add('open');
  renderPanel(p);
  renderTable();
}

function renderPanel(p) {
  const allocs = getAllocs(p.id);
  const dlFmt = formatDate(p.deadline);
  const dlClass = deadlineClass(p.deadline);
  const dlLabel = deadlineLabel(p.deadline);
  const stL = {active:'Activ',completed:'Finalizat',paused:'Pauzat'}[p.status]||p.status;
  const logs = db.logs.filter(l=>l.projectId===p.id).sort((a,b)=>b.timestamp.localeCompare(a.timestamp));

  // Designer blocks
  const designerBlocks = allocs.map(a => {
    const pPct = n(a.pitchEst)>0 ? Math.min((n(a.pitchReal)/n(a.pitchEst))*100,100) : 0;
    const iPct = n(a.implEst)>0 ? Math.min((n(a.implReal)/n(a.implEst))*100,100) : 0;
    const pColor = pPct>=100?'var(--danger)':pPct>75?'var(--accent)':'var(--pitch)';
    const iColor = iPct>=100?'var(--danger)':iPct>75?'var(--accent)':'var(--impl)';
    return `<div class="panel-designer-block">
      <div class="panel-designer-header ${a.designer.toLowerCase()}">
        <span class="dot ${a.designer.toLowerCase()}"></span>${a.designer}
      </div>
      <div class="panel-phase-row">
        <span class="panel-phase-label pitch">Pitch</span>
        <span class="panel-phase-nums" style="font-family:var(--font-mono);font-size:10px;">
          <span style="color:var(--text);font-weight:600;">${n(a.pitchReal).toFixed(1)}</span>
          <span style="color:var(--text3)"> / </span>
          <span style="color:var(--text2);">${n(a.pitchEst)>0?n(a.pitchEst)+'h':'—'}</span>
        </span>
      </div>
      ${n(a.pitchEst)>0?`<div class="panel-phase-bar"><div class="panel-phase-bar-fill" style="width:${pPct}%;background:${pColor}"></div></div>`:''}
      <div class="panel-phase-row" style="margin-top:6px;">
        <span class="panel-phase-label impl">Implementare</span>
        <span class="panel-phase-nums" style="font-family:var(--font-mono);font-size:10px;">
          <span style="color:var(--text);font-weight:600;">${n(a.implReal).toFixed(1)}</span>
          <span style="color:var(--text3)"> / </span>
          <span style="color:var(--text2);">${n(a.implEst)>0?n(a.implEst)+'h':'—'}</span>
        </span>
      </div>
      ${n(a.implEst)>0?`<div class="panel-phase-bar"><div class="panel-phase-bar-fill" style="width:${iPct}%;background:${iColor}"></div></div>`:''}
    </div>`;
  }).join('');

  // Log entries
  const logHtml = logs.length ? logs.map(l => {
    const time = new Date(l.timestamp);
    const timeStr = `${time.toLocaleDateString('ro-RO')} ${time.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})}`;
    let changes = [];
    try { changes = JSON.parse(l.changes); } catch(e) {}
    const changeRows = changes.map(c =>
      `<div class="log-change">
        <span style="color:var(--text3);">${c.field}:</span>
        <span class="old">${c.old}</span>
        <span class="arrow">→</span>
        <span class="new">${c.new}</span>
      </div>`
    ).join('');
    return `<div class="log-entry">
      <div class="log-time">${timeStr}</div>
      <div class="log-changes">${changeRows || '<span style="color:var(--text3);font-size:10px;">Proiect creat</span>'}</div>
    </div>`;
  }).join('') : '<div class="log-empty">Nicio modificare înregistrată</div>';

  document.getElementById('panelInner').innerHTML = `
    <div class="panel-header">
      <div>
        <div class="panel-title">${p.name}</div>
        <div class="panel-subtitle">${p.client||'—'}</div>
      </div>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>

    <div class="panel-section">
      <div class="panel-section-label">Detalii proiect</div>
      <div class="panel-field">
        <span class="panel-field-label">Status</span>
        <span class="proj-status ${p.status}">${stL}</span>
      </div>
      <div class="panel-field">
        <span class="panel-field-label">Deadline</span>
        <span class="panel-field-value ${dlClass}">${dlFmt}${dlLabel ? `<span style="font-size:9px;margin-left:4px;">${dlLabel}</span>` : ''}</span>
      </div>
      ${p.note ? `<div class="panel-field" style="flex-direction:column;align-items:flex-start;gap:4px;">
        <span class="panel-field-label">Notă</span>
        <span style="font-size:11px;color:var(--text2);line-height:1.5;">${p.note}</span>
      </div>` : ''}
    </div>

    <div class="panel-section">
      <div class="panel-section-label">Ore per designer</div>
      ${designerBlocks || '<div class="log-empty">Niciun designer alocat</div>'}
    </div>

    <div class="panel-section" style="border-bottom:none;">
      <div class="panel-section-label">Istoric modificări</div>
      <div class="log-list">${logHtml}</div>
    </div>
  `;
}

// ─── FORM DESIGNERS ───────────────────────
function renderFormDesigners() {
  const c = document.getElementById('designerRows');
  if (!formDesigners.length) {
    c.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);padding:8px 0;">Niciun designer — apasă + pentru a adăuga</div>`;
    return;
  }
  c.innerHTML = formDesigners.map((fd,i) => `
    <div class="designer-row">
      <div class="designer-row-header">
        <span class="designer-row-name ${fd.designer.toLowerCase()}">${fd.designer}</span>
        <button class="btn-remove" onclick="removeDesignerRow(${i})">×</button>
      </div>
      <div class="phase-grid">
        <div class="phase-group">
          <span class="phase-label pitch">Pitch</span>
          <div class="phase-inputs-pair">
            <div>
              <div class="mini-label">Estimate (h)</div>
              <input class="form-input" type="number" min="0" step="0.5" placeholder="0" value="${fd.pitchEst||''}"
                onchange="formDesigners[${i}].pitchEst=parseFloat(this.value)||0">
            </div>
            <div>
              <div class="mini-label">Realizate (h)</div>
              <input class="form-input" type="number" min="0" step="0.5" placeholder="0" value="${fd.pitchReal||''}"
                onchange="formDesigners[${i}].pitchReal=parseFloat(this.value)||0">
            </div>
          </div>
        </div>
        <div class="phase-group">
          <span class="phase-label impl">Implementare</span>
          <div class="phase-inputs-pair">
            <div>
              <div class="mini-label">Estimate (h)</div>
              <input class="form-input" type="number" min="0" step="0.5" placeholder="0" value="${fd.implEst||''}"
                onchange="formDesigners[${i}].implEst=parseFloat(this.value)||0">
            </div>
            <div>
              <div class="mini-label">Realizate (h)</div>
              <input class="form-input" type="number" min="0" step="0.5" placeholder="0" value="${fd.implReal||''}"
                onchange="formDesigners[${i}].implReal=parseFloat(this.value)||0">
            </div>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function addDesignerRow() {
  const d = document.getElementById('addDesignerSel').value;
  if (formDesigners.find(fd=>fd.designer===d)) { toast('Designer deja adăugat',true); return; }
  formDesigners.push({designer:d,pitchEst:0,pitchReal:0,implEst:0,implReal:0});
  renderFormDesigners();
}
function removeDesignerRow(i) { formDesigners.splice(i,1); renderFormDesigners(); }

// ─── PROJECT CRUD ─────────────────────────
function openAddProject() {
  editingId=null; formDesigners=[];
  document.getElementById('projModalTitle').textContent='Proiect nou';
  ['f_name','f_client','f_note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_status').value='active';
  document.getElementById('f_deadline').value='';
  renderFormDesigners(); openModal('projModal');
}

function editProject(id) {
  const p = db.projects.find(x=>x.id===id); if (!p) return;
  editingId = id;
  document.getElementById('projModalTitle').textContent='Editează proiect';
  document.getElementById('f_name').value=p.name;
  document.getElementById('f_client').value=p.client||'';
  document.getElementById('f_status').value=p.status;
  document.getElementById('f_deadline').value=formatDate(p.deadline)||'';
  document.getElementById('f_note').value=p.note||'';
  formDesigners = db.allocations.filter(a=>a.projectId===id).map(a=>({
    id:a.id, designer:a.designer,
    pitchEst:n(a.pitchEst), pitchReal:n(a.pitchReal),
    implEst:n(a.implEst),   implReal:n(a.implReal)
  }));
  renderFormDesigners(); openModal('projModal');
}

async function saveProject() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { alert('Introdu numele proiectului.'); return; }
  const proj = {
    id: editingId||uid(), name,
    client: document.getElementById('f_client').value.trim(),
    status: document.getElementById('f_status').value,
    deadline: document.getElementById('f_deadline').value,
    note: document.getElementById('f_note').value.trim(),
    createdAt: new Date().toISOString()
  };
  showLoading('Se salvează...');
  try {
    if (editingId) {
      // Capture old state for diff
      const oldProj = db.projects.find(x=>x.id===editingId) || {};
      const oldAllocs = db.allocations.filter(a=>a.projectId===editingId).map(a=>({...a}));

      await apiUpdate('Projects', editingId, proj);
      const idx = db.projects.findIndex(x=>x.id===editingId);
      db.projects[idx] = proj;
      const toDelete = db.allocations.filter(a=>a.projectId===editingId && a.id);
      for (const a of toDelete) await apiClear('Allocations', a.id);
      db.allocations = db.allocations.filter(a=>a.projectId!==editingId);

      for (const fd of formDesigners) {
        const alloc = {
          id: uid(), projectId: proj.id, designer: fd.designer,
          pitchEst: fd.pitchEst||0, pitchReal: fd.pitchReal||0,
          implEst: fd.implEst||0,   implReal: fd.implReal||0
        };
        await apiAppend('Allocations', alloc);
        db.allocations.push(alloc);
      }

      // Build and save diff log
      const changes = buildDiff(oldProj, proj, oldAllocs, formDesigners);
      if (changes.length > 0) await appendLog(proj.id, changes);

    } else {
      await apiAppend('Projects', proj);
      db.projects.push(proj);
      for (const fd of formDesigners) {
        const alloc = {
          id: uid(), projectId: proj.id, designer: fd.designer,
          pitchEst: fd.pitchEst||0, pitchReal: fd.pitchReal||0,
          implEst: fd.implEst||0,   implReal: fd.implReal||0
        };
        await apiAppend('Allocations', alloc);
        db.allocations.push(alloc);
      }
      // Log creation
      await appendLog(proj.id, []);
    }
    toast(editingId?'Proiect actualizat ✓':'Proiect adăugat ✓');
    closeModal('projModal');
    if (activePanelId === proj.id) openPanel(proj.id);
    render();
  } catch(e) { toast('Eroare: '+e.message, true); console.error('saveProject error:', e); }
  hideLoading();
}

async function deleteProject(id) {
  if (!confirm('Ștergi proiectul și toate alocările?')) return;
  showLoading('Se șterge...');
  try {
    await apiClear('Projects', id);
    const oldAllocs = db.allocations.filter(a=>a.projectId===id);
    for (const a of oldAllocs) await apiClear('Allocations', a.id);
    const oldLogs = db.logs.filter(l=>l.projectId===id);
    for (const l of oldLogs) await apiClear('Logs', l.id);
    db.projects = db.projects.filter(p=>p.id!==id);
    db.allocations = db.allocations.filter(a=>a.projectId!==id);
    db.logs = db.logs.filter(l=>l.projectId!==id);
    if (activePanelId === id) closePanel();
    toast('Proiect șters'); render();
  } catch(e) { toast('Eroare: '+e.message, true); console.error(e); }
  hideLoading();
}

document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el){el.classList.remove('open'); editingId=null;}}));

// ─── INIT ─────────────────────────────────
async function init() {
  showLoading('Se inițializează...');
  try {
    await Promise.all([
      apiInitHeaders('Projects', ['id','name','client','status','deadline','note','createdAt']),
      apiInitHeaders('Allocations', ['id','projectId','designer','pitchEst','pitchReal','implEst','implReal']),
      apiInitHeaders('Logs', ['id','projectId','timestamp','changes'])
    ]);
  } catch(e) { console.warn('Init:', e); }
  hideLoading();
  await loadAllData();
}

init();
</script>
